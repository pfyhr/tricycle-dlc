name: Deploy live simulator to GitHub Pages

# Publishes the outputs/ folder (the live simulator index.html landing page, plus the
# per-combo figures and chase-cam players) as a static site. Everything is
# self-contained HTML/SVG - no build step. Enable once in repo Settings -> Pages ->
# Source: "GitHub Actions". Site URL: https://<user>.github.io/tricycle-dlc/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: outputs
      - id: deployment
        uses: actions/deploy-pages@v4
