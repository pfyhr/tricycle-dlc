<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tricycle — live planar lap simulator</title>
<style>
:root{
  --ground:#151a16; --asphalt:#3b3e44; --edge:#b9b4a6; --kerb:#a8473c;
  --panel:rgba(12,14,16,.80); --panel-line:rgba(255,255,255,.08);
  --ink:#e8e6df; --ink-dim:#9a9891; --accent:#e8c15a;
  --good:#7dbf7f; --bad:#d06355; --track:rgba(255,255,255,.10);
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#0c0e10;color:var(--ink);
  font-family:var(--sans);-webkit-font-smoothing:antialiased}
canvas#world{position:fixed;inset:0;width:100vw;height:100vh;display:block}
.hud{position:fixed;padding:10px 14px;background:var(--panel);border:1px solid var(--panel-line);
     border-radius:11px;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);user-select:none}
.hud h3{margin:0 0 8px;font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--ink-dim);font-weight:600}

/* top-left: session results */
#session{top:14px;left:14px;min-width:186px}
#session .lap{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:34px;
  font-weight:600;letter-spacing:.5px;line-height:1}
#session .sub{font-size:11px;color:var(--ink-dim);margin-top:3px}
#session .grid{display:grid;grid-template-columns:auto auto;gap:6px 14px;margin-top:11px;
  font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:14px}
#session .grid .l{color:var(--ink-dim);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
  align-self:center;font-family:var(--sans)}
#session .real{color:var(--accent)}
#session .lap.dirty{color:var(--accent)}   /* lap set while tuning — not a clean full lap yet */
#session .lap.dirty::after{content:' *';font-size:.5em;vertical-align:super;color:var(--accent)}

/* top-right: minimap + garage */
#mini{top:14px;right:14px;padding:9px}
#mini canvas{display:block}
#track{width:212px;margin-top:8px;font-family:var(--sans);font-size:12.5px;color:var(--ink);
  background:#1a1d1a;border:1px solid var(--panel-line);border-radius:7px;padding:6px 8px;cursor:pointer}
#garage{top:314px;right:14px;width:230px}
#garage select{width:100%;font-family:var(--sans);font-size:13px;color:var(--ink);
  background:#1a1d1a;border:1px solid var(--panel-line);border-radius:7px;padding:7px 9px;
  margin-bottom:13px;cursor:pointer}
.slider{margin:0 0 12px}
.slider .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.slider .val{font-family:var(--mono);color:var(--accent);font-variant-numeric:tabular-nums}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;
  background:rgba(255,255,255,.14);outline:none;margin:6px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.5)}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:none}
.seg{display:flex;gap:6px;margin-top:4px}
.seg button{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--panel-line);color:var(--ink-dim);
  border-radius:7px;font-family:var(--sans);font-size:12px;padding:6px 0;cursor:pointer}
.seg button.on{border-color:var(--accent);color:var(--accent);background:rgba(232,193,90,.08)}

/* bottom-left: live telemetry */
#tele{bottom:66px;left:14px;display:flex;gap:18px;align-items:flex-end}
#speed{font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1}
#speed .v{font-size:52px;font-weight:600}
#speed .u{font-size:11px;color:var(--ink-dim);letter-spacing:1.5px;text-transform:uppercase}
.rows{display:grid;grid-template-columns:auto auto;gap:2px 10px;
  font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums}
.rows .l{color:var(--ink-dim);font-size:10px;letter-spacing:1px;text-transform:uppercase;align-self:center}
#gg{position:relative}
#gg canvas{display:block}
#gg .cap{font-size:9px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:3px}
#bars{display:flex;gap:8px;align-items:flex-end;height:86px}
.bar{width:14px;height:70px;background:rgba(255,255,255,.07);border-radius:4px;position:relative;overflow:hidden}
.bar i{position:absolute;bottom:0;left:0;right:0;border-radius:4px}
.bar.t i{background:var(--good)} .bar.b i{background:var(--bad)}
.bar .bl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:4px;
  font-size:9px;color:var(--ink-dim);letter-spacing:1px}
#steerwrap{display:flex;flex-direction:column;gap:5px;align-items:center}
#steerc{display:block}
#steerwrap .bl{font-size:9px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase}

/* bottom: playback control bar */
#ctrl{bottom:14px;left:14px;right:14px;display:flex;gap:12px;align-items:center;padding:8px 14px}
#ctrl button{background:none;border:1px solid var(--panel-line);color:var(--ink);border-radius:6px;
  font-family:var(--mono);font-size:13px;padding:4px 12px;cursor:pointer}
#ctrl button:hover{border-color:var(--accent);color:var(--accent)}
#ctrl button.on{border-color:var(--accent);color:var(--accent)}
#scrub{flex:1;accent-color:var(--accent)}
#ctrl .spd{color:var(--ink-dim);font-size:11px;white-space:nowrap}
#ctrl .clock{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;min-width:104px}
#ctrl select{background:#1a1d1a;color:var(--ink);border:1px solid var(--panel-line);border-radius:6px;
  font-family:var(--mono);padding:3px 6px}
#ctrl input[type=range].z{width:84px;accent-color:var(--accent);vertical-align:middle}

/* charts drawer — lives in the empty left-centre zone so it never covers the garage */
#charts{left:14px;top:206px;width:392px;max-width:calc(100vw - 28px);display:none}
#charts.show{display:block}
#charts canvas{width:100%;display:block;border-radius:6px}
#charts .ct{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-dim);margin:2px 0 4px}
#charts .cap{font-size:10.5px;color:var(--ink-dim);margin:4px 0 12px;display:flex;gap:12px;flex-wrap:wrap}
#charts .cap b{font-weight:400;color:var(--ink)}
.sw{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:4px}

/* drive-yourself: mode button highlight + control hint above the playback bar */
#drive.on{border-color:var(--accent);color:var(--accent)}
#drivehint{position:fixed;left:50%;bottom:60px;transform:translateX(-50%);display:none;
  background:var(--panel);border:1px solid var(--panel-line);border-radius:8px;
  padding:6px 14px;font-size:12px;letter-spacing:.4px;color:var(--ink-dim);pointer-events:none;
  backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);white-space:nowrap}
body.driving #drivehint{display:block}
body.driving.touched #drivehint{display:none}   /* hide the prompt once the player is driving */

/* mobile-only "car setup" toggle button (hidden on desktop, where the panel is always shown) */
#setupToggle{display:none;position:fixed;z-index:5;background:var(--panel);color:var(--ink);
  border:1px solid var(--panel-line);border-radius:9px;font-family:var(--sans);font-size:12px;
  padding:8px 12px;cursor:pointer;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}

@media(max-width:640px){
  /* top-left session: compact */
  #session{top:10px;left:10px;min-width:0;max-width:52vw;padding:9px 11px}
  #session .lap{font-size:26px}
  #session .sub{font-size:10px}
  #session .grid{gap:4px 10px;margin-top:8px;font-size:12px}
  #session .grid .l{font-size:8.5px}
  /* top-right: keep only the track dropdown (minimap hidden) */
  #mini{top:10px;right:10px;padding:8px}
  #mini canvas,#mini h3{display:none}
  #track{width:32vw;max-width:150px;margin-top:0;font-size:12px}
  /* car setup: a toggled top-right sheet instead of a mid-screen floating panel */
  #setupToggle{display:block;top:64px;right:10px}
  #setupToggle.on{border-color:var(--accent);color:var(--accent)}
  #garage{display:none;top:104px;right:10px;left:auto;bottom:auto;
    width:min(80vw,260px);max-height:calc(100vh - 184px);overflow-y:auto}
  #garage.open{display:block}
  /* bottom telemetry: speed + g-g + steering only (drop the wrapping rows and throttle bars) */
  #tele{bottom:58px;left:10px;right:10px;gap:16px;align-items:flex-end}
  #tele .rows,#tele #bars{display:none}
  #speed .v{font-size:38px}
  /* playback bar: drop zoom, tighten so the clock/speed stop colliding */
  #ctrl{bottom:10px;left:10px;right:10px;gap:8px;padding:7px 10px;flex-wrap:wrap}
  #ctrl button{padding:4px 10px}
  #zoomctl{display:none}
  #ctrl .clock{min-width:0;font-size:12px}
  /* charts drawer: full-width below the top controls when opened */
  #charts{top:110px;left:10px;right:10px;width:auto;max-width:none}
}
</style></head>
<body>
<canvas id="world"></canvas>

<div class="hud" id="session">
  <div class="lap" id="lap">—</div>
  <div class="sub" id="carname">— · Ring Knutstorp</div>
  <div class="grid">
    <span class="l" id="lrow1">real lap</span><span class="real" id="real">—</span>
    <span class="l" id="lrow2">Δ to real</span><span id="delta">—</span>
    <span class="l">peak lat</span><span id="peakg">—</span>
    <span class="l">top speed</span><span id="vmax">—</span>
  </div>
</div>

<div class="hud" id="mini"><canvas id="minimap" width="212" height="212"></canvas>
  <h3 style="margin:9px 0 6px">Track</h3>
  <select id="track" aria-label="track"></select></div>

<button id="setupToggle" aria-expanded="false">car setup ▾</button>
<div class="hud" id="garage">
  <h3>Car setup</h3>
  <select id="preset"></select>
  <div id="sliders"></div>
  <div class="seg"><button id="dry" class="on">Dry</button><button id="wet">Wet</button></div>
</div>

<div class="hud" id="tele">
  <div id="speed"><div class="v" id="vval">0</div><div class="u">km/h</div></div>
  <div class="rows">
    <span class="l">yaw rate</span><span id="yawval">+0.0 °/s</span>
    <span class="l">lat acc</span><span id="ayval">+0.00 g</span>
    <span class="l">long acc</span><span id="axval">+0.00 g</span>
    <span class="l">v ref</span><span id="vrefval">0 km/h</span>
  </div>
  <div id="gg"><canvas id="ggc" width="92" height="92"></canvas><div class="cap">g-g</div></div>
  <div id="bars">
    <div class="bar t"><i id="thr"></i><span class="bl">THR</span></div>
    <div class="bar b"><i id="brk"></i><span class="bl">BRK</span></div>
  </div>
  <div id="steerwrap"><canvas id="steerc" width="76" height="76"></canvas><span class="bl">steer</span></div>
</div>

<div class="hud" id="charts">
  <div class="ct">Speed trace</div>
  <canvas id="spd" height="150"></canvas>
  <div class="cap"><span><span class="sw" style="background:var(--accent)"></span><b>driven</b></span>
    <span><span class="sw" style="background:var(--ink-dim)"></span><b>reference</b></span>
    <span><span class="sw" style="background:var(--kerb)"></span><b>real telemetry</b></span></div>
  <div class="ct">g–g envelope</div>
  <canvas id="gg2" height="150"></canvas>
</div>

<div class="hud" id="ctrl">
  <button id="play" aria-label="play/pause">▶</button>
  <button id="live" title="real-time live driving: parameter changes apply from the car's current state, no re-solve">live</button>
  <button id="drive" title="drive it yourself — arrow keys on desktop, touch-drag on phone; race the AI ghost">drive</button>
  <button id="restart" title="restart the race from start/finish — current car and its ghost launch together">⟲</button>
  <input id="scrub" type="range" min="0" max="1000" value="0">
  <span class="spd clock"><span id="ptime">0:00.0</span> / <span id="ltot">0:00.0</span></span>
  <span class="spd">speed <select id="pspeed"><option>0.5</option><option selected>1</option><option>2</option><option>4</option></select>×</span>
  <span class="spd" id="zoomctl">zoom <input class="z" id="zoom" type="range" min="60" max="240" value="120"></span>
  <button id="chartsBtn">charts</button>
</div>
<div id="drivehint"></div>

<script>
const D=__DATA__;
let T, curTrack;                 // current track table (switchable); set by buildGeom()
const $=id=>document.getElementById(id);
// ---- physics constants + fixed driver/profile calibration -----------------------
const C={uMin:1,uPrevMin:5,tauSteer:0.10,tauRoll:0.15,tauPitch:0.20,TpV:1.0,TpFF:0.6,
  xLA0:5.0,TLA:0.25,uLAcap:38,uKnee:43,uWid:15,brkTrig:0.40,brkMul:1.25,dMax:0.35,g:9.80665};   // driver reflexes; brkTrig/brkMul = late-hard braking
// uLAcap: cap the speed used for the lookahead distance (bounded preview). The path-feedback gain is held
// full below uKnee (~150 km/h — every corner) and rolls off above it (width uWid) so the high-speed
// straight-line steering limit cycle is damped without touching cornering tracking.
const GRIP_DERATE=0.90;   // speed profile budgets the grip the plant actually sustains…
                          //   (lower = cleaner line but slower; higher = faster but runs wider)
const MASS_EXP=0.5;       // …reduced further when the car is loaded past its design mass
const KMUL=1.7;           // lookahead feedback gain multiplier (tighter line tracking)

function interp(ys,xq){ // T.s is the shared monotone knot vector (0..L, N+1 pts)
  const xs=T.s; let x=((xq%T.L)+T.L)%T.L; let lo=0,hi=xs.length-1;
  if(x<=xs[0])return ys[0]; if(x>=xs[hi])return ys[hi];
  while(hi-lo>1){const m=(lo+hi)>>1; if(xs[m]<=x)lo=m; else hi=m;}
  const t=(x-xs[lo])/(xs[hi]-xs[lo]); return ys[lo]+t*(ys[hi]-ys[lo]);
}
const smin=(x,y,e)=>0.5*(x+y-Math.sqrt((x-y)*(x-y)+e*e));
const smax=(x,y,e)=>0.5*(x+y+Math.sqrt((x-y)*(x-y)+e*e));
function brush(al,Fz,Tt,mu){
  const Fzc=Math.max(Fz,50), Ca=Tt.c1*Math.sin(2*Math.atan(Fzc/Tt.c2)), ap=Tt.ap0*Math.sqrt(Fzc/Tt.FzNom);
  const sy=Math.tan(al), sA=Math.sqrt(sy*sy+1e-12), sg=sy/sA, th=Ca/(3*mu*Fzc);
  const uu=0.5*(th*sA+1-Math.sqrt((th*sA-1)*(th*sA-1)+1e-4)), lam=1-uu;
  return {Fy:mu*Fzc*(1-lam*lam*lam)*sg, Mz:-mu*Fzc*ap*uu*lam*lam*lam*sg};
}
function topSpeed(P){let v=60;for(let i=0;i<60;i++){const f=0.5*P.rho*P.CdA*v*v*v+P.Crr*P.m*C.g*v-P.Pmax;v-=f/(1.5*P.rho*P.CdA*v*v+P.Crr*P.m*C.g);}return v;}
function profile(P){
  const N=T.n,G=C.g,L=P.a+P.b, vTop=topSpeed(P);
  // honest cornering budget: grip the plant realizes, cut when overloaded past design mass
  const massF=Math.pow((P.m0||P.m)/P.m, MASS_EXP);
  const ayF=GRIP_DERATE*massF*P.ayFrac*P.mu*G;
  const axTrac=P.mu*G*(P.a/L)/(1-P.mu*P.hcg/L), dfk=0.5*P.rho*P.ClA/(P.m*G);
  const ayCap=v=>ayF*(1+dfk*v*v);
  const v=new Array(N);
  for(let i=0;i<N;i++){const k=Math.abs(T.kapLine[i]); if(k<1e-5){v[i]=vTop;}else{const den=k-ayF*dfk; v[i]=Math.min(vTop, den>1e-6?Math.sqrt(ayF/den):vTop);}}
  const seg=T.dsSeg;
  const ell=(vj,kj)=>{const cap=ayCap(vj);return Math.sqrt(Math.max(0,1-Math.min(Math.pow(vj*vj*Math.abs(kj)/cap,2),1)));};
  for(let p=0;p<4;p++){
    for(let i=0;i<N;i++){const j=i,jn=(i+1)%N; const axP=(P.Pmax/Math.max(v[j],5)-0.5*P.rho*P.CdA*v[j]*v[j]-P.Crr*P.m*G)/P.m;
      const ax=Math.min(axP,axTrac)*ell(v[j],T.kapLine[j]); v[jn]=Math.min(v[jn],Math.sqrt(Math.max(v[j]*v[j]+2*seg[j]*ax,1)));}
    for(let i=N-1;i>=0;i--){const j=i,jn=(i+1)%N; const axB=ayCap(v[jn])*ell(v[jn],T.kapLine[jn])+(0.5*P.rho*P.CdA*v[jn]*v[jn]+P.Crr*P.m*G)/P.m;
      v[j]=Math.min(v[j],Math.sqrt(v[jn]*v[jn]+2*seg[j]*axB));}
  }
  v.push(v[0]);            // wrap to match the N+1 knot vector T.s (interp reads index N at s=L)
  return v;
}
function deriv(y,P,vRef,ctrl){
  const s=y[0],n=y[1],dp=y[2],u=y[3],vy=y[4],r=y[5],delta=y[6],dFz=y[7],dFzX=y[8];
  const G=C.g,L=P.a+P.b,uG=Math.max(u,C.uMin), kap=interp(T.kap_c,s);
  const cd0=Math.cos(dp),sd0=Math.sin(dp), sdot=(u*cd0-vy*sd0)/Math.max(1-n*kap,0.2);
  let dCmd, axCmd;
  if(ctrl){                                      // human driving: steer + throttle/brake come from the player
    dCmd=-ctrl.steer*C.dMax; axCmd=ctrl.ax;   // steer>0 is a right turn for the driver; plant delta>0 is left
  } else {                                        // AI driver: lookahead-error steering + speed-profile long.
    const up=Math.max(u,C.uPrevMin);
    const nRef=interp(T.nRef,s),psiRef=interp(T.psiRef,s),kapNow=interp(T.kapLine,s);
    const kapLine=interp(T.kapLine,s+up*C.TpFF), dPrev=up*C.TpV, vRefP=interp(vRef,s+dPrev);
    const deltaFF=interp(T.deltaFF,s+up*C.TpFF);   // OCP sideslip steer FF (holds the min-time line)
    const xLA=C.xLA0+C.TLA*Math.min(up,C.uLAcap), eLA=(n-nRef)+xLA*(dp-psiRef);
    const gHi=1/(1+Math.pow(Math.max(0,up-C.uKnee)/C.uWid,2));   // full below uKnee; rolls off on fast straights
    dCmd=C.dMax*Math.tanh(((P.Lwb+P.Kus*u*u)*kapLine+deltaFF-gHi*KMUL*P.KLA*eLA-P.Kr*(r-kapNow*u))/C.dMax);
    // longitudinal: near preview tracks the reference speed; a far braking horizon watches for
    // slow corners beyond it (a single preview under-brakes into hairpins -> understeers wide).
    // The horizon is an ONSET TRIGGER, not a plan: braking only commits once the kinematic need
    // approaches the friction budget, then brakes hard - late-hard braking as in the RaceLogs
    // (real Elise braking p90 = 0.9 g; the old spread-out horizon braked at a soft 0.6 g max).
    axCmd=(vRefP*vRefP-u*u)/(2*dPrev);
    let aFar=0;
    for(let d=8;d<=up*2.2+10;d+=6){const vq=interp(vRef,s+d);
      if(vq<u){const a=(vq*vq-u*u)/(2*d); if(a<aFar)aFar=a;}}
    // friction-circle share for the pedals. Brake: commit late-and-hard as in the RaceLogs,
    // trailing off with the PLANNED path demand (kap) through turn-in; the commitment fades
    // with gHi because the logs only cover <=165 km/h and hard braking with rolled-off
    // steering authority half-spins the car. Throttle: no full power until the car unwinds -
    // gated on the worse of planned demand and MEASURED |r|u (understeer keeps kap high,
    // a slide keeps r high; either one holds the power off).
    const latK=Math.min(1,Math.abs(kapNow)*u*u/(P.mu*C.g));
    const latR=Math.min(1,Math.abs(r)*u/(P.mu*C.g)), latT=Math.max(latK,latR);
    if(aFar<axCmd){
      if(aFar<=-C.brkTrig*P.mu*C.g*gHi) axCmd=(1+(C.brkMul-1)*gHi)*aFar*Math.sqrt(1-latK*latK);
    } else if(axCmd>0) axCmd*=Math.sqrt(1-latT*latT);
  }
  const aFL=delta-Math.atan((vy+P.a*r)/Math.max(u-r*P.tf/2,C.uMin));
  const aFR=delta-Math.atan((vy+P.a*r)/Math.max(u+r*P.tf/2,C.uMin));
  const aR=-Math.atan((vy-P.b*r)/uG);
  // drive-yourself: soft-ground penalty past the drivable edge - mostly extra rolling drag
  // (grass scrubs speed), plus a light grip trim so it feels loose. AI stays on the tarmac,
  // so gate on ctrl to leave its validated laps untouched.
  let muFe=P.muF, muRe=P.muR, Crre=P.Crr;
  if(ctrl){ const g=Math.min(Math.max((Math.abs(n)-(T.width/2-0.9))/0.6,0),1);
    if(g>0){ Crre=P.Crr*(1+7*g); muFe=P.muF*(1-0.25*g); muRe=P.muR*(1-0.25*g); } }
  const Fdown=0.5*P.rho*P.ClA*u*u, Fz0F=P.m*G*P.b/(2*L)+P.aeroBal*Fdown/2, Fz0R=P.m*G*P.a/L+(1-P.aeroBal)*Fdown;
  const FzFL=Fz0F-dFz-dFzX/2,FzFR=Fz0F+dFz-dFzX/2,FzR=Fz0R+dFzX;

  $('ptime').textContent=fmtT(pb.t);
  if(!scrubbing)$('scrub').value=Math.round(pb.t/R.lap*1000);
  if($('charts').classList.contains('show'))drawSpeedChart();
}
function tick(ts){
  if(pb.playing&&R){ if(!pb.last)pb.last=ts; const dtw=(ts-pb.last)/1000; pb.last=ts;
    if(pb.live){ stepLive(dtw*pb.speed); renderLive(); }
    else { pb.t+=dtw*pb.speed; if(pb.t>=R.lap)pb.t=pb.t%R.lap; renderFrame(); }
  } else pb.last=0;
  requestAnimationFrame(tick);
}
// ---- real-time live driving -----------------------------------------------------
// Replay mode re-solves the whole lap on every change and scrubs the recording. Live mode
// keeps a persistent plant state and integrates it forward in wall-clock time, so a slider
// change takes effect from wherever the car is right now (no re-solve, no jump to S/F).
function liveParams(){ const P=Object.assign({},car); P.CdA=car.CdA+0.10*P.ClA;
  if(wet){P.muF*=0.72;P.muR*=0.72;P.mu*=0.72;} return P; }
function liveUpdate(){ LP=liveParams(); LvRef=profile(LP);      // apply a slider change live, no re-solve
  if(LY)LY.clean=false;                     // a mid-lap change -> the in-progress lap time isn't clean
  $('carname').textContent=car.name+' · '+D.names[curTrack]; }
// per-lap timing / ghost fields bolted onto the live state
const liveMeta=t=>({ghostT:t, lapStartT:t, lastLap:null, lastClean:true, clean:true, pkAy:0, vmx:0});
function seedLive(){                       // seamless hand-off from the replay frame at pb.t
  const p=sampleAt(R,pb.t), s=p.s, xc=interp(T.x,s),yc=interp(T.y,s),pc=interp(T.psiU,s);
  const n=(p.y-yc)*Math.cos(pc)-(p.x-xc)*Math.sin(pc), P=LP, L=P.a+P.b;
  return Object.assign({y:[s,n,p.h-pc,p.v/3.6,(p.v/3.6)*Math.tan(p.beta),p.yaw*Math.PI/180,p.del,
             P.xiF*P.m*p.ay*C.g*P.hcg/P.tf, P.m*p.ax*C.g*P.hcg/L],
          t:pb.t, laps:0, ax:p.ax, ay:p.ay}, liveMeta(pb.t));
}
function seedLiveCold(){                    // fresh start on the line (track change / live default)
  return Object.assign({y:[0,interp(T.nRef,0),interp(T.psiRef,0),LvRef[0],0,0,0,0,0],
          t:0, laps:0, ax:0, ay:0}, liveMeta(0));
}
function driveCtrl(){                        // human control vector for deriv (throttle/brake -> target accel)
  const u=LY.y[3], P=LP, coast=-(0.5*P.rho*P.CdA*u*u+P.Crr*P.m*C.g)/P.m;   // engine-off drag decel
  const ax = drv.thr>0.02 ? 3+drv.thr*10 : drv.brk>0.02 ? -drv.brk*16 : coast;
  return {steer:drv.steer, ax};
}
function stepLive(dtsim){                   // integrate the plant by wall time (RK4 substeps, h<=0.006)
  const P=LP, vRef=LvRef, dt=0.006; let y=LY.y, last=null, rem=Math.min(dtsim,0.15);
  if(pb.drive&&!drv.touch){                 // keyboard steering: ramp toward the held direction, self-centre
    const rate=3.2, ret=4.2;
    if(drv.left===drv.right) drv.steer-=Math.sign(drv.steer)*Math.min(Math.abs(drv.steer),ret*dtsim);
    else drv.steer=Math.max(-1,Math.min(1, drv.steer+(drv.right?1:-1)*rate*dtsim)); }
  const ctrl=pb.drive?driveCtrl():null;
  while(rem>1e-6){ const h=Math.min(dt,rem);
    const k1=deriv(y,P,vRef,ctrl), y2=y.map((v,i)=>v+0.5*h*k1.dy[i]), k2=deriv(y2,P,vRef,ctrl),
      y3=y.map((v,i)=>v+0.5*h*k2.dy[i]), k3=deriv(y3,P,vRef,ctrl),
      y4=y.map((v,i)=>v+h*k3.dy[i]), k4=deriv(y4,P,vRef,ctrl);
    y=y.map((v,i)=>v+h/6*(k1.dy[i]+2*k2.dy[i]+2*k3.dy[i]+k4.dy[i])); last=k1; rem-=h; }
  if(!last)return;                          // zero-length step (e.g. the first frame after enabling live)
  if(pb.drive&&drv.thr<0.02&&y[3]<0){ y[3]=0; y[4]=0; y[5]=0; }   // no reverse gear: brake/coast holds at rest
  LY.t+=dtsim; LY.ghostT+=dtsim; if(LY.ghostT>=R.lap)LY.ghostT-=R.lap;   // ghost loops the baseline lap
  if(y[0]>=T.L){ y[0]-=T.L; LY.laps++;      // crossed start/finish -> bank the actual lap time
    LY.lastLap=LY.t-LY.lapStartT; LY.lastClean=LY.clean;
    LY.lapStartT=LY.t; LY.clean=true; LY.pkAy=0; LY.vmx=0; }
  LY.y=y; LY.ax=last.ax/C.g; LY.ay=last.ay/C.g;
  LY.pkAy=Math.max(LY.pkAy,Math.abs(LY.ay)); LY.vmx=Math.max(LY.vmx,y[3]*3.6);
}
function renderLive(){
  const y=LY.y, s=y[0], xc=interp(T.x,s),yc=interp(T.y,s),pc=interp(T.psiU,s);
  const p={x:xc-y[1]*Math.sin(pc), y:yc+y[1]*Math.cos(pc), h:pc+y[2], v:y[3]*3.6,
    vref:interp(LvRef,s)*3.6, ax:LY.ax, ay:LY.ay, yaw:y[5]*180/Math.PI,
    del:y[6], beta:Math.atan2(y[4],Math.max(y[3],1)), s, t:LY.t};
  const g=sampleAt(R,LY.ghostT); ghostP={x:g.x, y:g.y, h:g.h, del:g.del};   // baseline pace car
  drawWorld(p); drawTele(p); fillSessionLive();
  $('ptime').textContent=fmtT(LY.t-LY.lapStartT)+(LY.laps?'  lap '+(LY.laps+1):'');   // current lap, not session total
  $('scrub').value=Math.round(s/T.L*1000);
  if($('charts').classList.contains('show'))drawSpeedChart();
}
function fillSessionLive(){                 // top-left panel while live: actual lap vs baseline ghost
  const done=LY.lastLap!=null, cur=LY.t-LY.lapStartT;
  $('lrow1').textContent='ghost lap'; $('lrow2').textContent='Δ ghost';
  $('lap').textContent=done?fmtT(LY.lastLap):fmtT(cur);
  $('lap').classList.toggle('dirty', done?!LY.lastClean:!LY.clean);   // mark a lap driven while tuning
  $('ltot').textContent=fmtT(R.lap);
  $('real').textContent=fmtT(R.lap);        // baseline (ghost) lap = the reference to beat
  if(done){ const d=LY.lastLap-R.lap; $('delta').textContent=(d>=0?'+':'−')+Math.abs(d).toFixed(1)+' s'; }
  else $('delta').textContent='—';
  $('peakg').textContent=LY.pkAy.toFixed(2)+' g'; $('vmax').textContent=Math.round(LY.vmx)+' km/h';
}
function rebaseGhost(){                      // new baseline car (preset / dry-wet): reset the ghost & timing
  if(!LY)return; Object.assign(LY, liveMeta(LY.t)); LY.ghostT=(LY.y[0]/T.L)*R.lap;   // align ghost to car
}
function setLive(on){
  pb.live=on; $('live').classList.toggle('on',on); $('scrub').disabled=on;
  if(on){ liveUpdate(); LY=seedLive();      // R stays the baseline lap -> ghost replays it
    if(!pb.playing){ pb.playing=true; $('play').textContent='❚❚'; } pb.last=0; }
  else { setDrive(false); ghostP=null; pb.t=0; run(); }
}
// drive yourself: hand the wheel to the player (arrow keys / touch), still real-time, racing the AI ghost
function setDrive(on){
  pb.drive=on; $('drive').classList.toggle('on',on); document.body.classList.toggle('driving',on);
  document.body.classList.remove('touched');   // re-show the control hint on each entry
  drv.steer=0; drv.thr=0; drv.brk=0; drv.left=false; drv.right=false; drv.touch=null;
  if(on){ if(!pb.live)setLive(true);        // driving implies live real-time
    if(!pb.playing){ pb.playing=true; $('play').textContent='❚❚'; pb.last=0; }
    $('drivehint').textContent = ('ontouchstart' in window)
      ? 'drag anywhere: ◂ ▸ steer · ▴ throttle · ▾ brake'
      : '↑ throttle   ↓ brake   ← → steer'; }
}
$('live').onclick=()=>{ if(R)setLive(!pb.live); };
$('drive').onclick=()=>{ if(R)setDrive(!pb.drive); };
// restart the race from start/finish with the CURRENT car: re-solve its baseline so the ghost
// is the same car, then launch both together (enters live mode if not already there)
$('restart').onclick=()=>{ if(!R)return; if(!pb.live)setLive(true);
  liveUpdate(); solveR(); LY=seedLiveCold(); pb.last=0;
  if(!pb.playing){ pb.playing=true; $('play').textContent='❚❚'; } };
// ---- car setup / solve ----------------------------------------------------------
const SL=[['m','Mass',400,1700,1,'kg'],['Pmax','Power',50e3,200e3,1e3,'kW',v=>Math.round(v/1e3)],
  ['mu','Grip µ',1.0,2.0,0.01,''],['ClA','Downforce',0,5,0.1,'m²']];
let car, wet=false;
const sd=$('sliders');
SL.forEach(([k,lab,mn,mx,st])=>{const el=document.createElement('label');el.className='slider';
  el.innerHTML=`<span class="lab"><span>${lab}</span><span class="val" id="v_${k}"></span></span>
    <input type="range" id="s_${k}" min="${mn}" max="${mx}" step="${st}">`;sd.appendChild(el);});
for(const[k,v] of Object.entries(D.presets)){const o=document.createElement('option');o.value=k;o.textContent=v.name;$('preset').appendChild(o);}
for(const t of D.order){const o=document.createElement('option');o.value=t;o.textContent=D.names[t];$('track').appendChild(o);}
$('track').addEventListener('change',e=>{ buildGeom(e.target.value); pb.last=0; pb.t=0;
  if(pb.live){ liveUpdate(); solveR(); LY=seedLiveCold(); }   // new track: rebuild baseline, restart at S/F
  else run();
  pb.playing=!matchMedia('(prefers-reduced-motion: reduce)').matches;
  $('play').textContent=pb.playing?'❚❚':'▶'; });
function slVal(k){const [,, , , , unit,disp]=SL.find(a=>a[0]===k);const raw=k==='mu'?car.muF:car[k];
  return (disp?disp(raw):(k==='mu'?raw.toFixed(2):k==='ClA'?raw.toFixed(1):Math.round(raw)))+(unit?' '+unit:'');}
function syncSliders(){SL.forEach(([k])=>{$('s_'+k).value=k==='mu'?car.muF:car[k];$('v_'+k).textContent=slVal(k);});}
function applyPreset(name){car=Object.assign({},D.presets[name]); car.m0=D.presets[name].m; syncSliders(); apply();}
// preset / dry-wet change = a different baseline car: re-solve it and reset the ghost to match;
// a plain slider tweak keeps the same baseline and just re-profiles the live car (liveUpdate)
function apply(){ if(pb.live){ solveR(); liveUpdate(); rebaseGhost(); } else run(); }
SL.forEach(([k])=>{$('s_'+k).addEventListener('input',e=>{const val=+e.target.value;
  if(k==='mu'){car.muF=val;car.muR=val;car.mu=val;} else car[k]=val; $('v_'+k).textContent=slVal(k);
  if(pb.live)liveUpdate(); else schedule();});});
$('preset').addEventListener('change',e=>{wet=false;$('dry').classList.add('on');$('wet').classList.remove('on');applyPreset(e.target.value);});
$('dry').onclick=()=>{wet=false;$('dry').classList.add('on');$('wet').classList.remove('on');apply();};
$('wet').onclick=()=>{wet=true;$('wet').classList.add('on');$('dry').classList.remove('on');apply();};
let raf=0; function schedule(){ if(raf)return; raf=requestAnimationFrame(()=>{raf=0;run();}); }
function solveR(){ const P=liveParams();     // solve the current car's full reference lap (baseline)
  R=simulate(P); R.tel=(D.tel[curTrack]||{})[$('preset').value]||null; }
function run(){
  solveR();
  $('carname').textContent=car.name+' · '+D.names[curTrack];
  $('lrow1').textContent='real lap'; $('lrow2').textContent='Δ to real'; $('lap').classList.remove('dirty');
  $('lap').textContent=R.done?fmtT(R.lap):'DNF';
  $('ltot').textContent=fmtT(R.lap);
  $('peakg').textContent=R.peak.toFixed(2)+' g'; $('vmax').textContent=Math.round(R.vmax)+' km/h';
  if(R.tel){$('real').textContent=fmtT(R.tel.lap); const d=R.lap-R.tel.lap;
    $('delta').textContent=(d>=0?'+':'−')+Math.abs(d).toFixed(1)+' s';}
  else{$('real').textContent='—';$('delta').textContent='—';}
  if(pb.t>R.lap)pb.t=0;
  drawCharts(); renderFrame();
}
// ---- controls -------------------------------------------------------------------
$('play').onclick=()=>{ if(!R)return; if(pb.t>=R.lap)pb.t=0; pb.playing=!pb.playing;
  pb.last=0; $('play').textContent=pb.playing?'❚❚':'▶'; };
$('scrub').addEventListener('pointerdown',()=>scrubbing=true);
$('scrub').addEventListener('pointerup',()=>scrubbing=false);
$('scrub').addEventListener('input',e=>{ if(!R||pb.live)return; pb.t=+e.target.value/1000*R.lap; renderFrame(); });
$('pspeed').onchange=e=>pb.speed=+e.target.value;
$('zoom').oninput=e=>{viewH=300-parseFloat(e.target.value); renderFrame();};
$('chartsBtn').onclick=()=>{const c=$('charts');c.classList.toggle('show');
  $('chartsBtn').classList.toggle('on',c.classList.contains('show')); drawCharts();};
$('setupToggle').onclick=()=>{const open=$('garage').classList.toggle('open');   // mobile car-setup sheet
  $('setupToggle').classList.toggle('on',open); $('setupToggle').setAttribute('aria-expanded',open);
  $('setupToggle').textContent=open?'car setup ▴':'car setup ▾';};
const DRVKEY={ArrowUp:'thr',ArrowDown:'brk',ArrowLeft:'left',ArrowRight:'right',   // arrows...
  KeyW:'thr',KeyS:'brk',KeyA:'left',KeyD:'right'};                                // ...or WASD
addEventListener('keydown',e=>{
  if(pb.drive&&DRVKEY[e.code]){ e.preventDefault(); document.body.classList.add('touched');
    const a=DRVKEY[e.code]; if(a==='thr')drv.thr=1; else if(a==='brk')drv.brk=1; else drv[a]=true; return; }
  if(e.code==='Space'){e.preventDefault();$('play').click();}
  if(e.code==='ArrowRight'&&R&&!pb.live){pb.t=Math.min(pb.t+3,R.lap-0.01);renderFrame();}
  if(e.code==='ArrowLeft'&&R&&!pb.live){pb.t=Math.max(pb.t-3,0);renderFrame();}
});
addEventListener('keyup',e=>{ if(!pb.drive||!DRVKEY[e.code])return;
  const a=DRVKEY[e.code]; if(a==='thr')drv.thr=0; else if(a==='brk')drv.brk=0; else drv[a]=false; });
// touch-drag anywhere on the world = a virtual stick: horizontal steers, vertical is throttle/brake
const stickR=64, updTouch=()=>{ const dx=drv.touch.x-drv.touch.ox, dy=drv.touch.y-drv.touch.oy;
  drv.steer=Math.max(-1,Math.min(1,dx/stickR));
  if(dy<0){drv.thr=Math.min(1,-dy/stickR);drv.brk=0;}else{drv.brk=Math.min(1,dy/stickR);drv.thr=0;} };
cv.addEventListener('touchstart',e=>{ if(!pb.drive)return; e.preventDefault();
  const t=e.changedTouches[0]; drv.touch={ox:t.clientX,oy:t.clientY,x:t.clientX,y:t.clientY};
  document.body.classList.add('touched'); updTouch(); },{passive:false});
cv.addEventListener('touchmove',e=>{ if(!pb.drive||!drv.touch)return; e.preventDefault();
  const t=e.changedTouches[0]; drv.touch.x=t.clientX; drv.touch.y=t.clientY; updTouch(); },{passive:false});
const endTouch=e=>{ if(!pb.drive)return; drv.touch=null; drv.steer=0; drv.thr=0; drv.brk=0; };
cv.addEventListener('touchend',endTouch); cv.addEventListener('touchcancel',endTouch);
addEventListener('resize',()=>{if(R){renderFrame();drawCharts();}});
requestAnimationFrame(tick);
buildGeom(D.default); $('track').value=D.default;
$('preset').value='elise'; applyPreset('elise');   // solves the baseline reference lap (R)
setLive(true);                                      // real-time live driving is the default view
if(matchMedia('(prefers-reduced-motion: reduce)').matches){ pb.playing=false; $('play').textContent='▶'; renderLive(); }
</script>
</body></html>
