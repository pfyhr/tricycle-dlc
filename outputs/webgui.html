<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tricycle — live planar lap simulator</title>
<style>
:root{
  --ground:#151a16; --asphalt:#3b3e44; --edge:#b9b4a6; --kerb:#a8473c;
  --panel:rgba(12,14,16,.80); --panel-line:rgba(255,255,255,.08);
  --ink:#e8e6df; --ink-dim:#9a9891; --accent:#e8c15a;
  --good:#7dbf7f; --bad:#d06355; --track:rgba(255,255,255,.10);
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#0c0e10;color:var(--ink);
  font-family:var(--sans);-webkit-font-smoothing:antialiased}
canvas#world{position:fixed;inset:0;width:100vw;height:100vh;display:block}
.hud{position:fixed;padding:10px 14px;background:var(--panel);border:1px solid var(--panel-line);
     border-radius:11px;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);user-select:none}
.hud h3{margin:0 0 8px;font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--ink-dim);font-weight:600}

/* top-left: session results */
#session{top:14px;left:14px;min-width:186px}
#session .lap{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:34px;
  font-weight:600;letter-spacing:.5px;line-height:1}
#session .sub{font-size:11px;color:var(--ink-dim);margin-top:3px}
#session .grid{display:grid;grid-template-columns:auto auto;gap:6px 14px;margin-top:11px;
  font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:14px}
#session .grid .l{color:var(--ink-dim);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
  align-self:center;font-family:var(--sans)}
#session .real{color:var(--accent)}

/* top-right: minimap + garage */
#mini{top:14px;right:14px;padding:9px}
#mini canvas{display:block}
#garage{top:236px;right:14px;width:230px}
#garage select{width:100%;font-family:var(--sans);font-size:13px;color:var(--ink);
  background:#1a1d1a;border:1px solid var(--panel-line);border-radius:7px;padding:7px 9px;
  margin-bottom:13px;cursor:pointer}
.slider{margin:0 0 12px}
.slider .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.slider .val{font-family:var(--mono);color:var(--accent);font-variant-numeric:tabular-nums}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;
  background:rgba(255,255,255,.14);outline:none;margin:6px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.5)}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:none}
.seg{display:flex;gap:6px;margin-top:4px}
.seg button{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--panel-line);color:var(--ink-dim);
  border-radius:7px;font-family:var(--sans);font-size:12px;padding:6px 0;cursor:pointer}
.seg button.on{border-color:var(--accent);color:var(--accent);background:rgba(232,193,90,.08)}

/* bottom-left: live telemetry */
#tele{bottom:66px;left:14px;display:flex;gap:18px;align-items:flex-end}
#speed{font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1}
#speed .v{font-size:52px;font-weight:600}
#speed .u{font-size:11px;color:var(--ink-dim);letter-spacing:1.5px;text-transform:uppercase}
.rows{display:grid;grid-template-columns:auto auto;gap:2px 10px;
  font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums}
.rows .l{color:var(--ink-dim);font-size:10px;letter-spacing:1px;text-transform:uppercase;align-self:center}
#gg{position:relative}
#gg canvas{display:block}
#gg .cap{font-size:9px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:3px}
#bars{display:flex;gap:8px;align-items:flex-end;height:86px}
.bar{width:14px;height:70px;background:rgba(255,255,255,.07);border-radius:4px;position:relative;overflow:hidden}
.bar i{position:absolute;bottom:0;left:0;right:0;border-radius:4px}
.bar.t i{background:var(--good)} .bar.b i{background:var(--bad)}
.bar .bl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:4px;
  font-size:9px;color:var(--ink-dim);letter-spacing:1px}
#steerwrap{display:flex;flex-direction:column;gap:4px;align-items:center}
#steer{width:120px;height:10px;background:rgba(255,255,255,.07);border-radius:5px;position:relative}
#steer i{position:absolute;top:1px;bottom:1px;width:8px;border-radius:4px;background:var(--accent);left:calc(50% - 4px)}
#steer:after{content:'';position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:rgba(255,255,255,.25)}
#steerwrap .bl{font-size:9px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase}

/* bottom: playback control bar */
#ctrl{bottom:14px;left:14px;right:14px;display:flex;gap:12px;align-items:center;padding:8px 14px}
#ctrl button{background:none;border:1px solid var(--panel-line);color:var(--ink);border-radius:6px;
  font-family:var(--mono);font-size:13px;padding:4px 12px;cursor:pointer}
#ctrl button:hover{border-color:var(--accent);color:var(--accent)}
#ctrl button.on{border-color:var(--accent);color:var(--accent)}
#scrub{flex:1;accent-color:var(--accent)}
#ctrl .spd{color:var(--ink-dim);font-size:11px;white-space:nowrap}
#ctrl .clock{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;min-width:104px}
#ctrl select{background:#1a1d1a;color:var(--ink);border:1px solid var(--panel-line);border-radius:6px;
  font-family:var(--mono);padding:3px 6px}
#ctrl input[type=range].z{width:84px;accent-color:var(--accent);vertical-align:middle}

/* charts drawer — lives in the empty left-centre zone so it never covers the garage */
#charts{left:14px;top:206px;width:392px;max-width:calc(100vw - 28px);display:none}
#charts.show{display:block}
#charts canvas{width:100%;display:block;border-radius:6px}
#charts .ct{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-dim);margin:2px 0 4px}
#charts .cap{font-size:10.5px;color:var(--ink-dim);margin:4px 0 12px;display:flex;gap:12px;flex-wrap:wrap}
#charts .cap b{font-weight:400;color:var(--ink)}
.sw{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:4px}

@media(max-width:720px){
  #garage{top:auto;bottom:66px;right:14px;width:200px}
  #mini{display:none} #charts{top:14px} #tele{gap:12px} #speed .v{font-size:40px}
}
</style></head>
<body>
<canvas id="world"></canvas>

<div class="hud" id="session">
  <div class="lap" id="lap">—</div>
  <div class="sub" id="carname">— · Ring Knutstorp</div>
  <div class="grid">
    <span class="l">real lap</span><span class="real" id="real">—</span>
    <span class="l">Δ to real</span><span id="delta">—</span>
    <span class="l">peak lat</span><span id="peakg">—</span>
    <span class="l">top speed</span><span id="vmax">—</span>
  </div>
</div>

<div class="hud" id="mini"><canvas id="minimap" width="212" height="212"></canvas></div>

<div class="hud" id="garage">
  <h3>Car setup</h3>
  <select id="preset"></select>
  <div id="sliders"></div>
  <div class="seg"><button id="dry" class="on">Dry</button><button id="wet">Wet</button></div>
</div>

<div class="hud" id="tele">
  <div id="speed"><div class="v" id="vval">0</div><div class="u">km/h</div></div>
  <div class="rows">
    <span class="l">yaw rate</span><span id="yawval">+0.0 °/s</span>
    <span class="l">lat acc</span><span id="ayval">+0.00 g</span>
    <span class="l">long acc</span><span id="axval">+0.00 g</span>
    <span class="l">v ref</span><span id="vrefval">0 km/h</span>
  </div>
  <div id="gg"><canvas id="ggc" width="92" height="92"></canvas><div class="cap">g-g</div></div>
  <div id="bars">
    <div class="bar t"><i id="thr"></i><span class="bl">THR</span></div>
    <div class="bar b"><i id="brk"></i><span class="bl">BRK</span></div>
  </div>
  <div id="steerwrap"><div id="steer"><i id="sti"></i></div><span class="bl">steer</span></div>
</div>

<div class="hud" id="charts">
  <div class="ct">Speed trace</div>
  <canvas id="spd" height="150"></canvas>
  <div class="cap"><span><span class="sw" style="background:var(--accent)"></span><b>driven</b></span>
    <span><span class="sw" style="background:var(--ink-dim)"></span><b>reference</b></span>
    <span><span class="sw" style="background:var(--kerb)"></span><b>real telemetry</b></span></div>
  <div class="ct">g–g envelope</div>
  <canvas id="gg2" height="150"></canvas>
</div>

<div class="hud" id="ctrl">
  <button id="play" aria-label="play/pause">▶</button>
  <input id="scrub" type="range" min="0" max="1000" value="0">
  <span class="spd clock"><span id="ptime">0:00.0</span> / <span id="ltot">0:00.0</span></span>
  <span class="spd">speed <select id="pspeed"><option>0.5</option><option selected>1</option><option>2</option><option>4</option></select>×</span>
  <span class="spd">zoom <input class="z" id="zoom" type="range" min="60" max="240" value="120"></span>
  <button id="chartsBtn">charts</button>
</div>

  $('peakg').textContent=R.peak.toFixed(2)+' g'; $('vmax').textContent=Math.round(R.vmax)+' km/h';
  if(R.tel){$('real').textContent=fmtT(R.tel.lap); const d=R.lap-R.tel.lap;
    $('delta').textContent=(d>=0?'+':'−')+Math.abs(d).toFixed(1)+' s';}
  else{$('real').textContent='—';$('delta').textContent='—';}
  if(pb.t>R.lap)pb.t=0;
  drawCharts(); renderFrame();
}
// ---- controls -------------------------------------------------------------------
$('play').onclick=()=>{ if(!R)return; if(pb.t>=R.lap)pb.t=0; pb.playing=!pb.playing;
  pb.last=0; $('play').textContent=pb.playing?'❚❚':'▶'; };
$('scrub').addEventListener('pointerdown',()=>scrubbing=true);
$('scrub').addEventListener('pointerup',()=>scrubbing=false);
$('scrub').addEventListener('input',e=>{ if(!R)return; pb.t=+e.target.value/1000*R.lap; renderFrame(); });
$('pspeed').onchange=e=>pb.speed=+e.target.value;
$('zoom').oninput=e=>{viewH=300-parseFloat(e.target.value); renderFrame();};
$('chartsBtn').onclick=()=>{const c=$('charts');c.classList.toggle('show');
  $('chartsBtn').classList.toggle('on',c.classList.contains('show')); drawCharts();};
addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();$('play').click();}
  if(e.code==='ArrowRight'&&R){pb.t=Math.min(pb.t+3,R.lap-0.01);renderFrame();}
  if(e.code==='ArrowLeft'&&R){pb.t=Math.max(pb.t-3,0);renderFrame();}
});
addEventListener('resize',()=>{if(R){renderFrame();drawCharts();}});
requestAnimationFrame(tick);
$('preset').value='elise'; applyPreset('elise');
if(!matchMedia('(prefers-reduced-motion: reduce)').matches){ pb.playing=true; $('play').textContent='❚❚'; }
</script>
</body></html>
