<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tricycle — live planar lap simulator</title>
<style>
:root{
  --ground:#151a16; --asphalt:#3b3e44; --edge:#b9b4a6; --kerb:#a8473c;
  --panel:rgba(12,14,16,.80); --panel-line:rgba(255,255,255,.08);
  --ink:#e8e6df; --ink-dim:#9a9891; --accent:#e8c15a;
  --good:#7dbf7f; --bad:#d06355; --track:rgba(255,255,255,.10);
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#0c0e10;color:var(--ink);
  font-family:var(--sans);-webkit-font-smoothing:antialiased}
canvas#world{position:fixed;inset:0;width:100vw;height:100vh;display:block}
.hud{position:fixed;padding:10px 14px;background:var(--panel);border:1px solid var(--panel-line);
     border-radius:11px;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);user-select:none}
.hud h3{margin:0 0 8px;font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--ink-dim);font-weight:600}

/* top-left: session results */
#session{top:14px;left:14px;min-width:186px}
#session .lap{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:34px;
  font-weight:600;letter-spacing:.5px;line-height:1}
#session .sub{font-size:11px;color:var(--ink-dim);margin-top:3px}
#session .grid{display:grid;grid-template-columns:auto auto;gap:6px 14px;margin-top:11px;
  font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:14px}
#session .grid .l{color:var(--ink-dim);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
  align-self:center;font-family:var(--sans)}
#session .real{color:var(--accent)}

/* top-right: minimap + garage */
#mini{top:14px;right:14px;padding:9px}
#mini canvas{display:block}
#garage{top:236px;right:14px;width:230px}
#garage select{width:100%;font-family:var(--sans);font-size:13px;color:var(--ink);
  background:#1a1d1a;border:1px solid var(--panel-line);border-radius:7px;padding:7px 9px;
  margin-bottom:13px;cursor:pointer}
.slider{margin:0 0 12px}
.slider .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.slider .val{font-family:var(--mono);color:var(--accent);font-variant-numeric:tabular-nums}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;
  background:rgba(255,255,255,.14);outline:none;margin:6px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.5)}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:none}
.seg{display:flex;gap:6px;margin-top:4px}
.seg button{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--panel-line);color:var(--ink-dim);
  border-radius:7px;font-family:var(--sans);font-size:12px;padding:6px 0;cursor:pointer}
.seg button.on{border-color:var(--accent);color:var(--accent);background:rgba(232,193,90,.08)}

/* bottom-left: live telemetry */
#tele{bottom:66px;left:14px;display:flex;gap:18px;align-items:flex-end}
#speed{font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1}
#speed .v{font-size:52px;font-weight:600}
#speed .u{font-size:11px;color:var(--ink-dim);letter-spacing:1.5px;text-transform:uppercase}
.rows{display:grid;grid-template-columns:auto auto;gap:2px 10px;
  font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums}
.rows .l{color:var(--ink-dim);font-size:10px;letter-spacing:1px;text-transform:uppercase;align-self:center}
#gg{position:relative}
#gg canvas{display:block}
#gg .cap{font-size:9px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:3px}
#bars{display:flex;gap:8px;align-items:flex-end;height:86px}
.bar{width:14px;height:70px;background:rgba(255,255,255,.07);border-radius:4px;position:relative;overflow:hidden}
.bar i{position:absolute;bottom:0;left:0;right:0;border-radius:4px}
.bar.t i{background:var(--good)} .bar.b i{background:var(--bad)}
.bar .bl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:4px;
  font-size:9px;color:var(--ink-dim);letter-spacing:1px}
#steerwrap{display:flex;flex-direction:column;gap:5px;align-items:center}
#steerc{display:block}
#steerwrap .bl{font-size:9px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase}

/* bottom: playback control bar */
#ctrl{bottom:14px;left:14px;right:14px;display:flex;gap:12px;align-items:center;padding:8px 14px}
#ctrl button{background:none;border:1px solid var(--panel-line);color:var(--ink);border-radius:6px;
  font-family:var(--mono);font-size:13px;padding:4px 12px;cursor:pointer}
#ctrl button:hover{border-color:var(--accent);color:var(--accent)}
#ctrl button.on{border-color:var(--accent);color:var(--accent)}
#scrub{flex:1;accent-color:var(--accent)}
#ctrl .spd{color:var(--ink-dim);font-size:11px;white-space:nowrap}
#ctrl .clock{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;min-width:104px}
#ctrl select{background:#1a1d1a;color:var(--ink);border:1px solid var(--panel-line);border-radius:6px;
  font-family:var(--mono);padding:3px 6px}
#ctrl input[type=range].z{width:84px;accent-color:var(--accent);vertical-align:middle}

/* charts drawer — lives in the empty left-centre zone so it never covers the garage */
#charts{left:14px;top:206px;width:392px;max-width:calc(100vw - 28px);display:none}
#charts.show{display:block}
#charts canvas{width:100%;display:block;border-radius:6px}
#charts .ct{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-dim);margin:2px 0 4px}
#charts .cap{font-size:10.5px;color:var(--ink-dim);margin:4px 0 12px;display:flex;gap:12px;flex-wrap:wrap}
#charts .cap b{font-weight:400;color:var(--ink)}
.sw{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:4px}

@media(max-width:720px){
  #garage{top:auto;bottom:66px;right:14px;width:200px}
  #mini{display:none} #charts{top:14px} #tele{gap:12px} #speed .v{font-size:40px}
}
</style></head>
<body>
<canvas id="world"></canvas>

<div class="hud" id="session">
  <div class="lap" id="lap">—</div>
  <div class="sub" id="carname">— · Ring Knutstorp</div>
  <div class="grid">
    <span class="l">real lap</span><span class="real" id="real">—</span>
    <span class="l">Δ to real</span><span id="delta">—</span>
    <span class="l">peak lat</span><span id="peakg">—</span>
    <span class="l">top speed</span><span id="vmax">—</span>
  </div>
</div>

<div class="hud" id="mini"><canvas id="minimap" width="212" height="212"></canvas></div>

<div class="hud" id="garage">
  <h3>Car setup</h3>
  <select id="preset"></select>
  <div id="sliders"></div>
  <div class="seg"><button id="dry" class="on">Dry</button><button id="wet">Wet</button></div>
</div>

<div class="hud" id="tele">
  <div id="speed"><div class="v" id="vval">0</div><div class="u">km/h</div></div>
  <div class="rows">
    <span class="l">yaw rate</span><span id="yawval">+0.0 °/s</span>
    <span class="l">lat acc</span><span id="ayval">+0.00 g</span>
    <span class="l">long acc</span><span id="axval">+0.00 g</span>
    <span class="l">v ref</span><span id="vrefval">0 km/h</span>
  </div>
  <div id="gg"><canvas id="ggc" width="92" height="92"></canvas><div class="cap">g-g</div></div>
  <div id="bars">
    <div class="bar t"><i id="thr"></i><span class="bl">THR</span></div>
    <div class="bar b"><i id="brk"></i><span class="bl">BRK</span></div>
  </div>
  <div id="steerwrap"><canvas id="steerc" width="64" height="64"></canvas><span class="bl">steer</span></div>
</div>

<div class="hud" id="charts">
  <div class="ct">Speed trace</div>
  <canvas id="spd" height="150"></canvas>
  <div class="cap"><span><span class="sw" style="background:var(--accent)"></span><b>driven</b></span>
    <span><span class="sw" style="background:var(--ink-dim)"></span><b>reference</b></span>
    <span><span class="sw" style="background:var(--kerb)"></span><b>real telemetry</b></span></div>
  <div class="ct">g–g envelope</div>
  <canvas id="gg2" height="150"></canvas>
</div>

<div class="hud" id="ctrl">
  <button id="play" aria-label="play/pause">▶</button>
  <input id="scrub" type="range" min="0" max="1000" value="0">
  <span class="spd clock"><span id="ptime">0:00.0</span> / <span id="ltot">0:00.0</span></span>
  <span class="spd">speed <select id="pspeed"><option>0.5</option><option selected>1</option><option>2</option><option>4</option></select>×</span>
  <span class="spd">zoom <input class="z" id="zoom" type="range" min="60" max="240" value="120"></span>
  <button id="chartsBtn">charts</button>
</div>

    const s=y[0], xc=interp(T.x,s),yc=interp(T.y,s),pc=interp(T.psiU,s);
    o.s.push(s);o.v.push(y[3]*3.6);o.x.push(xc-y[1]*Math.sin(pc));o.y.push(yc+y[1]*Math.cos(pc));
    o.h.push(pc+y[2]);o.del.push(y[6]);o.beta.push(Math.atan2(y[4],Math.max(y[3],1)));
    o.yaw.push(y[5]*180/Math.PI);o.vref.push(interp(vRef,s)*3.6);
    const k=rk4(y); o.ax.push(k.k1.ax/C.g);o.ay.push(k.k1.ay/C.g);
    peak=Math.max(peak,Math.abs(k.k1.ay)/C.g); vmax=Math.max(vmax,y[3]*3.6);
    y=k.y; t+=dt; st++;
  }
  const vmn=Math.min(...o.v),vmx=Math.max(...o.v);
  return {o,lap:t,vRef,peak,vmax,dt,vmn,vmx,done:y[0]>=T.L};
}
// ---- world chase camera ---------------------------------------------------------
const cv=$('world'), ctx=cv.getContext('2d');
let W,H,dpr=Math.min(devicePixelRatio||1,2), viewH=120;
function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;}
addEventListener('resize',resize); resize();
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const TX=T.x,TY=T.y,TK=T.kap_c,NP=T.n;
// static road + kerb geometry (track is fixed; car varies)
const road=new Path2D(); road.moveTo(TX[0],TY[0]);
for(let i=1;i<=NP;i++)road.lineTo(TX[i%NP],TY[i%NP]); road.closePath();
const kerbs=new Path2D();
for(let i=0;i<NP;i++){ if(Math.abs(TK[i])>0.010){const j=(i+1)%NP;kerbs.moveTo(TX[i],TY[i]);kerbs.lineTo(TX[j],TY[j]);} }
const ROADW=8.4;
function vcol(f){f=Math.max(0,Math.min(1,f));const r=Math.round(255*Math.min(1,Math.max(0,1.7*f-0.55)));
  const g=Math.round(255*Math.min(1,0.35+0.75*f));const b=Math.round(255*Math.max(0,0.75-1.2*f));return`rgb(${r},${g},${b})`;}
function drawWorld(p){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle=css('--ground'); ctx.fillRect(0,0,W,H);
  const k=H/viewH, cx=W/2, cy=H*0.62, cs=Math.cos(p.h), sn=Math.sin(p.h);
  // world -> screen: heading points up (canvas y down)
  ctx.setTransform(k*sn*dpr,-k*cs*dpr,-k*cs*dpr,-k*sn*dpr,
                   dpr*(cx-k*(sn*p.x-cs*p.y)), dpr*(cy+k*(cs*p.x+sn*p.y)));
  ctx.lineJoin='round';ctx.lineCap='butt';
  ctx.strokeStyle=css('--kerb'); ctx.lineWidth=ROADW+2.0; ctx.stroke(kerbs);
  ctx.strokeStyle=css('--edge'); ctx.lineWidth=ROADW+0.8; ctx.stroke(road);
  ctx.strokeStyle=css('--asphalt'); ctx.lineWidth=ROADW; ctx.stroke(road);
  ctx.strokeStyle='rgba(255,255,255,.26)'; ctx.lineWidth=0.16;
  ctx.setLineDash([3,7]); ctx.stroke(road); ctx.setLineDash([]);
  // start/finish
  ctx.save(); ctx.translate(TX[0],TY[0]);
  ctx.rotate(Math.atan2(TY[1]-TY[0],TX[1]-TX[0]));
  ctx.fillStyle='rgba(255,255,255,.7)';
  for(let i=-4;i<4;i++)for(let j=0;j<2;j++)if((i+j)%2===0)ctx.fillRect(j*0.8,i*1.3,0.8,1.3);
  ctx.restore();
  // upcoming racing line coloured by speed — wrap indices past the seam so it stays continuous
  const NN=R.o.x.length, idx=Math.round(p.t/R.dt);
  ctx.lineWidth=0.5; ctx.lineCap='round';
  for(let k=idx-140;k<=idx+900;k++){const i=((k%NN)+NN)%NN, j=(((k-1)%NN)+NN)%NN;
    ctx.strokeStyle=vcol((R.o.v[i]-R.vmn)/(R.vmx-R.vmn+1e-6));
    ctx.beginPath();ctx.moveTo(R.o.x[j],R.o.y[j]);ctx.lineTo(R.o.x[i],R.o.y[i]);ctx.stroke();}
  ctx.lineCap='butt';
  // sideslip velocity vector
  const vh=p.h+p.beta, vl=Math.min(10,p.v*0.06+1.5);
  ctx.strokeStyle=css('--accent');ctx.lineWidth=0.28;ctx.beginPath();
  ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(vh)*vl,p.y+Math.sin(vh)*vl);ctx.stroke();
  // car
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.h);
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.beginPath(); ctx.roundRect(-2.05,-0.98,4.1,1.96,0.45); ctx.fill();
  // wheels (front steered)
  ctx.fillStyle='#1a1c1e';
  for(const[wx,wy,st] of [[1.15,-0.92,p.del],[1.15,0.92,p.del],[-1.25,-0.92,0],[-1.25,0.92,0]]){
    ctx.save();ctx.translate(wx,wy);ctx.rotate(st);ctx.beginPath();ctx.roundRect(-0.42,-0.28,0.84,0.56,0.12);ctx.fill();ctx.restore();}
  ctx.fillStyle='#d8dade'; ctx.beginPath(); ctx.roundRect(-1.95,-0.82,3.9,1.64,0.42); ctx.fill();
  ctx.fillStyle='#23262b'; ctx.beginPath(); ctx.roundRect(-0.35,-0.62,1.15,1.24,0.22); ctx.fill();
  ctx.fillStyle=css('--accent'); ctx.fillRect(1.55,-0.5,0.32,1.0);
  ctx.restore();
}
// ---- minimap --------------------------------------------------------------------
const mm=$('minimap'), mctx=mm.getContext('2d'); let mmBase, mmap; {
  const xmin=Math.min(...TX),xmax=Math.max(...TX),ymin=Math.min(...TY),ymax=Math.max(...TY);
  const pad=12,sz=212, kk=(sz-2*pad)/Math.max(xmax-xmin,ymax-ymin);
  mmap=(x,y)=>[pad+(x-xmin)*kk+(sz-2*pad-(xmax-xmin)*kk)/2, sz-pad-(y-ymin)*kk-(sz-2*pad-(ymax-ymin)*kk)/2];
  mmBase=document.createElement('canvas'); mmBase.width=mmBase.height=sz;
  const b=mmBase.getContext('2d'); b.strokeStyle='rgba(232,230,223,.5)'; b.lineWidth=1.6; b.beginPath();
  const[x0,y0]=mmap(TX[0],TY[0]); b.moveTo(x0,y0);
  for(let i=1;i<NP;i++){const[xx,yy]=mmap(TX[i],TY[i]);b.lineTo(xx,yy);} b.closePath(); b.stroke();
}
function drawMini(p){
  mctx.clearRect(0,0,212,212); mctx.drawImage(mmBase,0,0);
  const[xx,yy]=mmap(p.x,p.y); mctx.fillStyle=css('--accent');
  mctx.beginPath();mctx.arc(xx,yy,4,0,7);mctx.fill();
  mctx.strokeStyle='rgba(0,0,0,.5)';mctx.lineWidth=1;mctx.beginPath();mctx.arc(xx,yy,4,0,7);mctx.stroke();
}
// ---- g-g dot (live) --------------------------------------------------------------
const gg=$('ggc').getContext('2d'); const trail=[];
function drawGGhud(p){
  gg.clearRect(0,0,92,92);
  gg.strokeStyle='rgba(255,255,255,.16)';
  gg.beginPath();gg.arc(46,46,40,0,7);gg.stroke(); gg.beginPath();gg.arc(46,46,20,0,7);gg.stroke();
  gg.beginPath();gg.moveTo(6,46);gg.lineTo(86,46);gg.moveTo(46,6);gg.lineTo(46,86);gg.stroke();
  trail.push([p.ay,p.ax]); if(trail.length>26)trail.shift();
  for(let i=0;i<trail.length;i++){const a=i/trail.length;
    gg.fillStyle=`rgba(232,193,90,${0.1+0.55*a})`;
    gg.beginPath();gg.arc(46+trail[i][0]*40,46-trail[i][1]*40,i===trail.length-1?3.5:2,0,7);gg.fill();}
}
// ---- steering wheel (rotates with steer; yellow marker at 12 o'clock) ------------
const swc=$('steerc').getContext('2d');
function drawWheel(del){
  const g=swc; g.clearRect(0,0,64,64); const cx=32,cy=32,rr=23;
  const ang=Math.max(-1,Math.min(1,del/C.dMax))*2.3;   // amplify road-wheel angle to wheel turn
  g.strokeStyle=css('--ink-dim'); g.lineWidth=3; g.beginPath(); g.arc(cx,cy,rr,0,7); g.stroke();
  g.save(); g.translate(cx,cy); g.rotate(ang);
  g.strokeStyle=css('--ink-dim'); g.lineWidth=2.6; g.lineCap='round'; g.beginPath();
  g.moveTo(0,0); g.lineTo(0,-rr);                       // top spoke
  g.moveTo(0,0); g.lineTo(-rr*0.87,rr*0.5);             // lower-left spoke
  g.moveTo(0,0); g.lineTo(rr*0.87,rr*0.5);              // lower-right spoke
  g.stroke();
  g.fillStyle=css('--ink-dim'); g.beginPath(); g.arc(0,0,4.5,0,7); g.fill();     // hub
  g.fillStyle=css('--accent'); g.beginPath(); g.arc(0,-rr,4.5,0,7); g.fill();    // top marker
  g.restore();
}
// ---- telemetry HUD (DOM) ---------------------------------------------------------
const fmtSigned=(v,d,u)=>(v>=0?'+':'−')+Math.abs(v).toFixed(d)+' '+u;
function drawTele(p){
  $('vval').textContent=Math.round(p.v);
  $('vrefval').textContent=Math.round(p.vref)+' km/h';
  $('yawval').textContent=fmtSigned(p.yaw,1,'°/s');
  $('ayval').textContent=fmtSigned(p.ay,2,'g');
  $('axval').textContent=fmtSigned(p.ax,2,'g');
  $('thr').style.height=(Math.max(0,Math.min(p.ax/1.1,1))*100).toFixed(0)+'%';
  $('brk').style.height=(Math.max(0,Math.min(-p.ax/1.1,1))*100).toFixed(0)+'%';
  drawWheel(p.del); drawGGhud(p); drawMini(p);
}
// ---- charts (speed trace + g-g scatter) -----------------------------------------
function cctx(id,h){const cvv=$(id),w=cvv.clientWidth||360;cvv.width=w*dpr;cvv.height=h*dpr;
  const g=cvv.getContext('2d');g.setTransform(dpr,0,0,dpr,0,0);return{g,w,h};}
function drawSpeedChart(){
  if(!R)return; const{g,w,h}=cctx('spd',150), L=T.L;
  const vmx=Math.max(R.vmax,...R.vRef.map(v=>v*3.6))*1.06;
  const PX=s=>34+(s/L)*(w-42), PY=v=>h-18-(v/vmx)*(h-30);
  g.clearRect(0,0,w,h);
  g.strokeStyle='rgba(255,255,255,.07)';g.fillStyle=css('--ink-dim');g.font='9px '+css('--mono');
  for(let gy=0;gy<=vmx;gy+=50){g.beginPath();g.moveTo(34,PY(gy));g.lineTo(w-8,PY(gy));g.stroke();g.fillText(gy,4,PY(gy)+3);}
  g.strokeStyle=css('--ink-dim');g.setLineDash([4,3]);g.lineWidth=1;g.beginPath();
  for(let i=0;i<NP;i++){const px=PX(T.s[i]),py=PY(R.vRef[i]*3.6);i?g.lineTo(px,py):g.moveTo(px,py);}g.stroke();g.setLineDash([]);
  if(R.tel){g.strokeStyle=css('--kerb');g.setLineDash([5,3]);g.lineWidth=1.3;g.beginPath();
    for(let i=0;i<R.tel.frac.length;i++){const px=PX(R.tel.frac[i]*L),py=PY(R.tel.v[i]);i?g.lineTo(px,py):g.moveTo(px,py);}g.stroke();g.setLineDash([]);}
  g.strokeStyle=css('--accent');g.lineWidth=1.6;g.beginPath();
  for(let i=0;i<R.o.s.length;i++){const px=PX(R.o.s[i]),py=PY(R.o.v[i]);i?g.lineTo(px,py):g.moveTo(px,py);}g.stroke();
  // playback cursor
  const cs=sampleAt(R,pb.t).s;g.strokeStyle=css('--ink');g.globalAlpha=.5;g.lineWidth=1;
  g.beginPath();g.moveTo(PX(cs),10);g.lineTo(PX(cs),h-18);g.stroke();g.globalAlpha=1;
}
function drawGGChart(){
  if(!R)return; const{g,w,h}=cctx('gg2',150), cx=w/2,cy=h/2,rad=Math.min(w,h)/2-16,lim=1.7;
  g.clearRect(0,0,w,h);
  g.strokeStyle='rgba(255,255,255,.10)';g.beginPath();g.moveTo(cx,8);g.lineTo(cx,h-8);g.moveTo(14,cy);g.lineTo(w-8,cy);g.stroke();
  const mu=Math.max(R.peak,1.0);g.strokeStyle=css('--ink-dim');g.globalAlpha=.5;g.beginPath();g.arc(cx,cy,rad*mu/lim,0,7);g.stroke();g.globalAlpha=1;
  for(let i=0;i<R.o.ay.length;i+=2){const px=cx+R.o.ay[i]/lim*rad,py=cy-R.o.ax[i]/lim*rad;
    g.fillStyle=vcol((R.o.v[i]-R.vmn)/(R.vmx-R.vmn+1e-6));g.globalAlpha=.5;g.fillRect(px-1.1,py-1.1,2.2,2.2);}
  g.globalAlpha=1;g.fillStyle=css('--ink-dim');g.font='9px '+css('--mono');g.fillText('lat',w-20,cy-4);g.fillText('lon',cx+4,12);
}
function drawCharts(){ if($('charts').classList.contains('show')){drawSpeedChart();drawGGChart();} }
// ---- playback -------------------------------------------------------------------
const lerp=(a,f,i)=>a[i]+(a[Math.min(i+1,a.length-1)]-a[i])*f;
function sampleAt(R,tq){const o=R.o,Nn=o.x.length; let fi=tq/R.dt; if(fi>Nn-1.001)fi=Nn-1.001; if(fi<0)fi=0;
  const i=Math.floor(fi),f=fi-i;
  return {x:lerp(o.x,f,i),y:lerp(o.y,f,i),h:lerp(o.h,f,i),v:lerp(o.v,f,i),vref:lerp(o.vref,f,i),
    ax:lerp(o.ax,f,i),ay:lerp(o.ay,f,i),yaw:lerp(o.yaw,f,i),del:lerp(o.del,f,i),beta:lerp(o.beta,f,i),
    s:lerp(o.s,f,i),t:tq};}
const fmtT=s=>{const m=Math.floor(s/60);return m+':'+(s-60*m).toFixed(1).padStart(4,'0');};
let R=null, pb={t:0,playing:false,speed:1,last:0}, scrubbing=false;
function renderFrame(){ if(!R)return; const p=sampleAt(R,pb.t);
  drawWorld(p); drawTele(p);
  $('ptime').textContent=fmtT(pb.t);
  if(!scrubbing)$('scrub').value=Math.round(pb.t/R.lap*1000);
  if($('charts').classList.contains('show'))drawSpeedChart();
}
function tick(ts){
  if(pb.playing&&R){ if(!pb.last)pb.last=ts; pb.t+=(ts-pb.last)/1000*pb.speed; pb.last=ts;
    if(pb.t>=R.lap)pb.t=pb.t%R.lap;    // loop for a continuous follower feel
    renderFrame();
  } else pb.last=0;
  requestAnimationFrame(tick);
}
// ---- car setup / solve ----------------------------------------------------------
const SL=[['m','Mass',700,1300,1,'kg'],['Pmax','Power',50e3,200e3,1e3,'kW',v=>Math.round(v/1e3)],
  ['mu','Grip µ',1.0,1.8,0.01,''],['ClA','Downforce',0,5,0.1,'m²']];
let car, wet=false;
const sd=$('sliders');
SL.forEach(([k,lab,mn,mx,st])=>{const el=document.createElement('label');el.className='slider';
  el.innerHTML=`<span class="lab"><span>${lab}</span><span class="val" id="v_${k}"></span></span>
    <input type="range" id="s_${k}" min="${mn}" max="${mx}" step="${st}">`;sd.appendChild(el);});
for(const[k,v] of Object.entries(D.presets)){const o=document.createElement('option');o.value=k;o.textContent=v.name;$('preset').appendChild(o);}
function slVal(k){const [,, , , , unit,disp]=SL.find(a=>a[0]===k);const raw=k==='mu'?car.muF:car[k];
  return (disp?disp(raw):(k==='mu'?raw.toFixed(2):k==='ClA'?raw.toFixed(1):Math.round(raw)))+(unit?' '+unit:'');}
function syncSliders(){SL.forEach(([k])=>{$('s_'+k).value=k==='mu'?car.muF:car[k];$('v_'+k).textContent=slVal(k);});}
function applyPreset(name){car=Object.assign({},D.presets[name]); car.m0=D.presets[name].m; syncSliders(); run();}
SL.forEach(([k])=>{$('s_'+k).addEventListener('input',e=>{const val=+e.target.value;
  if(k==='mu'){car.muF=val;car.muR=val;car.mu=val;} else car[k]=val; $('v_'+k).textContent=slVal(k); schedule();});});
$('preset').addEventListener('change',e=>{wet=false;$('dry').classList.add('on');$('wet').classList.remove('on');applyPreset(e.target.value);});
$('dry').onclick=()=>{wet=false;$('dry').classList.add('on');$('wet').classList.remove('on');run();};
$('wet').onclick=()=>{wet=true;$('wet').classList.add('on');$('dry').classList.remove('on');run();};
let raf=0; function schedule(){ if(raf)return; raf=requestAnimationFrame(()=>{raf=0;run();}); }
function run(){
  const P=Object.assign({},car);
  P.CdA=car.CdA+0.10*P.ClA;                    // downforce drag penalty
  if(wet){P.muF*=0.72;P.muR*=0.72;P.mu*=0.72;}
  R=simulate(P); R.tel=D.tel[$('preset').value]||null;
  $('carname').textContent=car.name+' · '+D.trackName;
  $('lap').textContent=R.done?fmtT(R.lap):'DNF';
  $('ltot').textContent=fmtT(R.lap);
  $('peakg').textContent=R.peak.toFixed(2)+' g'; $('vmax').textContent=Math.round(R.vmax)+' km/h';
  if(R.tel){$('real').textContent=fmtT(R.tel.lap); const d=R.lap-R.tel.lap;
    $('delta').textContent=(d>=0?'+':'−')+Math.abs(d).toFixed(1)+' s';}
  else{$('real').textContent='—';$('delta').textContent='—';}
  if(pb.t>R.lap)pb.t=0;
  drawCharts(); renderFrame();
}
// ---- controls -------------------------------------------------------------------
$('play').onclick=()=>{ if(!R)return; if(pb.t>=R.lap)pb.t=0; pb.playing=!pb.playing;
  pb.last=0; $('play').textContent=pb.playing?'❚❚':'▶'; };
$('scrub').addEventListener('pointerdown',()=>scrubbing=true);
$('scrub').addEventListener('pointerup',()=>scrubbing=false);
$('scrub').addEventListener('input',e=>{ if(!R)return; pb.t=+e.target.value/1000*R.lap; renderFrame(); });
$('pspeed').onchange=e=>pb.speed=+e.target.value;
$('zoom').oninput=e=>{viewH=300-parseFloat(e.target.value); renderFrame();};
$('chartsBtn').onclick=()=>{const c=$('charts');c.classList.toggle('show');
  $('chartsBtn').classList.toggle('on',c.classList.contains('show')); drawCharts();};
addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();$('play').click();}
  if(e.code==='ArrowRight'&&R){pb.t=Math.min(pb.t+3,R.lap-0.01);renderFrame();}
  if(e.code==='ArrowLeft'&&R){pb.t=Math.max(pb.t-3,0);renderFrame();}
});
addEventListener('resize',()=>{if(R){renderFrame();drawCharts();}});
requestAnimationFrame(tick);
$('preset').value='elise'; applyPreset('elise');
if(!matchMedia('(prefers-reduced-motion: reduce)').matches){ pb.playing=true; $('play').textContent='❚❚'; }
</script>
</body></html>
